name: Test 591 Crawler

on:
  workflow_dispatch:   # 手動觸發，測試用

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright jinja2
          playwright install chromium --with-deps

      - name: Test 591 fetch (板橋, 最多 1 頁)
        run: |
          python - <<'EOF'
          import asyncio, sys, json, time
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as pw:
                  browser = await pw.chromium.launch(headless=True)
                  ctx = await browser.new_context(locale="zh-TW")
                  page = await ctx.new_page()

                  # Step 1: load homepage
                  print("Step 1: loading homepage...")
                  try:
                      await page.goto("https://rent.591.com.tw/", wait_until="domcontentloaded", timeout=30000)
                      await page.wait_for_timeout(3000)
                      title = await page.title()
                      print(f"  page title: {title}")
                  except Exception as e:
                      print(f"  ❌ homepage load failed: {e}")
                      sys.exit(1)

                  # Step 2: call API
                  print("Step 2: calling API...")
                  ts = str(int(time.time() * 1000))
                  resp = await ctx.request.get(
                      "https://bff-house.591.com.tw/v3/web/rent/list",
                      params={"timestamp": ts, "regionid": "3", "kind": "1", "section": "26", "firstRow": "0"},
                      headers={"device": "pc", "Referer": "https://rent.591.com.tw/"}
                  )
                  print(f"  HTTP status: {resp.status}")
                  raw = await resp.text()
                  print(f"  response length: {len(raw)} bytes")
                  print(f"  response preview: {raw[:300]}")

                  # Step 3: parse JSON
                  try:
                      body = json.loads(raw)
                  except Exception as e:
                      print(f"❌ JSON parse failed: {e}")
                      print("→ Cloudflare is blocking GitHub Actions IP")
                      sys.exit(1)

                  total = body.get("data", {}).get("total", 0)
                  items = body.get("data", {}).get("items") or []
                  print(f"  API status field: {body.get('status')}")
                  print(f"  total: {total}, items returned: {len(items)}")

                  if items:
                      print(f"  first item: {items[0].get('address')} / NT${items[0].get('price')}")
                      print("✅ SUCCESS")
                  else:
                      print("❌ FAILED - no items")
                      sys.exit(1)

                  await browser.close()

          asyncio.run(main())
          EOF
